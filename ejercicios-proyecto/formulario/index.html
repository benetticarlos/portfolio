<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header>
            <section class="titulo">
                <h1>MUNDO GEEK</h1>
            </section>
        </header>
        <div class="mensaje">
            <section class="inscripcion">
                <h2>Inscripción al primer congreso Nerd de programadores</h2>
            </section>
            </div>

        <div class="formulario">
            <form action="https://formspree.io/meqpqzdg" method="POST">
                <div class="form-group">
                  <label for="formGroupExampleInput">Nombre:</label>
                  <input type="text" class="form-control" id="formGroupExampleInput">
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput2">Apellido:</label>
                  <input type="text" class="form-control" id="formGroupExampleInput2">
                  <div class="form-group">
                    <label for="formGroupExampleInput">Email de contacto:</label>
                    <input type="text" class="form-control" id="formGroupExampleInput" placeholder="pepito123@example.com">
                  </div>
                  <div class="form-group">
                    <label for="formGroupExampleInput2">Experiencia</label>
                    <select class="custom-select">
                        <option selected>Seleccionar</option>
                        <option value="1">Novato</option>
                        <option value="2">Senior</option>
                      </select>
                </div>
                
            </div>
            
            <div class="binario">
                <h4>Indíca un número binario que te guste. Este dato es para una actividad sorpresa.</h4>
            </div>
            <div class="radio-check">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="binario-0" id="exampleRadios1" value="option1" checked>
                <label class="form-check-label" for="exampleRadios1">
                    0
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="binario-1" id="exampleRadios2" value="option2">
                <label class="form-check-label" for="exampleRadios2">
                    1
                </label>
              </div>
              
              
              
            </div>
            <div class="checkbox">
                
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="defaultCheck1">
                    <label class="form-check-label" for="defaultCheck1">
                        Quieres recibir información sobre los proximos congresos que estaremos realizando para nuestra comunidad nerd?
                    </label>
                </div>
            </div>

            <div class="enviar">
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    
    
    </div>
        
    </body>
    </html>
